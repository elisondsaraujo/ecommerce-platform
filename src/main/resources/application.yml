spring:
  application:
    name: ecommerce-platform
  profiles:
    active: dev
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect
  datasource:
    url: jdbc:postgresql://localhost:5432/ecommerce_db
    username: ecommerce_user
    password: ecommerce_password
    driver-class-name: org.postgresql.Driver
  data:
    mongodb:
      uri: mongodb://ecommerce_user:ecommerce_password@localhost:27017/ecommerce_db?authSource=admin
    redis:
      host: localhost
      port: 6379
      timeout: 60000ms
      jedis:
        pool:
          max-active: 8
          max-idle: 8
          min-idle: 0
  flyway:
    enabled: true
    baselineOnMigrate: true
    locations: classpath:db/migration

server:
  port: 8080
  servlet:
    context-path: /api

logging:
  level:
    root: INFO
    com.ecommerce: DEBUG
    org.springframework.security: DEBUG

app:
  jwt:
    secret: your-secret-key-change-this-in-production-very-long-secret-key-for-jwt
    expiration: 86400000
    refreshExpiration: 604800000